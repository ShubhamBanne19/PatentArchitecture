# ─── THE PATENT ARCHITECT - Firebase Hosting Deployment ───────────────────────
# Builds the Angular SPA on Firebase Hosting (Spark/Free plan) with QR companion
# routes and Razorpay subscription backend.
#
# IMPORTANT - QR codes:
#   Once the book is printed, the /companion/chapter-NN routes are permanent.
#   Never remove those routes from app.routes.ts or change Firebase Hosting config.
#
# Setup:
#   1. Install Firebase CLI: npm install -g firebase-tools
#   2. Authenticate: firebase login:ci --no-localhost (get token for secrets)
#   3. Create repo secrets:
#      - FIREBASE_CI_TOKEN: from step 2
#   4. Update firebase.json with your Firebase project ID
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FIREBASE_PROJECT_ID: patent-architect

jobs:
  build:
    name: Build Angular App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app (production)
        run: npx ng build --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: dist/patent-architect
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: dist/patent-architect

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: patent-architect
          channelId: live
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworksci
