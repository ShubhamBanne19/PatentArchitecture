# ─── THE PATENT ARCHITECT - GitHub Pages Deployment ─────────────────────────
# Builds the Angular site and deploys to GitHub Pages on push to main.
#
# IMPORTANT - base-href:
#   Replace "patent-architect" below with your actual GitHub repo name.
#   If you use a custom domain (e.g. patentarchitect.in), change base-href to /
#   and configure your CNAME file in src/assets.
#
# IMPORTANT - QR codes:
#   Once the book is printed, the /companion/chapter-NN routes are permanent.
#   Never remove those routes from app.routes.ts or change this deployment target.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Angular Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app (production)
        # --base-href: set to /PatentArchitecture/ for github.io/PatentArchitecture
        # If you have a custom domain, change this to /
        # The trailing slash is REQUIRED for Angular's router to work correctly.
        run: |
          npx ng build --configuration=production \
            --base-href=/PatentArchitecture/ \
            --output-path=dist/PatentArchitecture

      - name: Copy 404.html for SPA deep-link fallback
        # This is CRITICAL for QR code deep-links to work.
        # GitHub Pages serves 404.html for unknown paths. Our 404.html
        # encodes the URL and redirects to index.html, where Angular's
        # router handles the actual navigation.
        run: |
          cp dist/PatentArchitecture/404.html dist/PatentArchitecture/404.html || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/PatentArchitecture

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
